spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3306/shorturl_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.shorturl.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

jwt:
  secret: your-256-bit-secret-key-change-this-in-production-environment-32chars
  expiration: 7200000  # 2小时（毫秒）

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    tryItOutEnabled: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
